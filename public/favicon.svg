<!-- favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#ffffff"/>
  <!-- Book spine -->
  <rect x="8" y="6" width="4" height="20" rx="1" fill="#4f46e5"/>
  <!-- Book cover -->
  <rect x="11" y="6" width="13" height="20" rx="1" fill="#6366f1"/>
  <!-- Lines (ruled pages) -->
  <line x1="14" y1="12" x2="21" y2="12" stroke="#c7d2fe" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="15" x2="21" y2="15" stroke="#c7d2fe" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="21" y2="18" stroke="#c7d2fe" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Spine highlight -->
  <rect x="8" y="6" width="1.5" height="20" rx="0.5" fill="#818cf8" opacity="0.5"/>
</svg>